name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## Feature Request
        Describe the feature you'd like to see in SmrutiCortex.

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      description: Which area does this feature relate to?
      options:
        - Search Engine (ranking, scoring, tokenizer)
        - AI / Ollama Integration (keyword expansion, embeddings)
        - Quick Search Overlay (Ctrl+Shift+S overlay)
        - Popup UI / Settings
        - Privacy & Security
        - Performance / Optimization
        - Developer Experience (CI, testing, tooling)
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What frustration does it address?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this feature work? Be as specific as possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches or workarounds you've considered.

  - type: dropdown
    id: scope
    attributes:
      label: Estimated Scope
      description: How large is this change likely to be?
      options:
        - Small (single file change)
        - Medium (2-5 files)
        - Large (6+ files or new subsystem)
        - Unknown
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'm willing to submit a PR for this feature
