name: Bug Report
description: Report a bug in SmrutiCortex
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## Bug Report
        Thank you for taking the time to report a bug. Please fill in as much detail as possible.

  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      description: Which part of the extension is affected?
      options:
        - Search (keyword results, ranking, relevance)
        - AI / Ollama (keyword expansion, embeddings, semantic search)
        - Quick Search Overlay (Ctrl+Shift+S overlay on pages)
        - Popup UI (toolbar popup, settings modal)
        - Indexing (history/bookmark indexing, metadata extraction)
        - Settings (preferences, storage, defaults)
        - Build / CI (build failures, workflow issues)
        - Other
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is the impact?
      options:
        - Critical (extension crashes, data loss)
        - High (major feature broken, no workaround)
        - Medium (feature partially broken, has workaround)
        - Low (cosmetic, minor inconvenience)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of what happened vs what you expected.
      placeholder: |
        **What happened:**
        Search results take 3+ seconds to appear when AI is disabled.

        **What I expected:**
        Results should appear in <50ms when AI/semantic search are both disabled.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Numbered steps to consistently reproduce the bug.
      placeholder: |
        1. Open SmrutiCortex popup (Ctrl+Shift+S or toolbar icon)
        2. Ensure AI and Semantic search are disabled in settings
        3. Type "github" in the search box
        4. Observe the delay before results appear
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser & Version
      description: "e.g., Chrome 122.0.6261.69, Edge 122.0.2365.52"
      placeholder: "Chrome 122.0.6261.69"
    validations:
      required: true

  - type: input
    id: extension-version
    attributes:
      label: Extension Version
      description: "Found in popup footer or manifest.json"
      placeholder: "8.0.0"

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "Windows 11 / macOS 14.3 / Ubuntu 22.04"

  - type: textarea
    id: console-errors
    attributes:
      label: Console Errors
      description: "Open DevTools (F12) > Console tab on the popup or chrome://extensions service worker"
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Drag and drop screenshots here if helpful.

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched existing issues for duplicates
          required: true
        - label: I have tested with the latest version of the extension
        - label: I can reproduce this bug consistently
