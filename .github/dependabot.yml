# Dependabot — security-only mode.
#
# Policy: this extension ships dist/ only (no runtime npm deps reach users)
# and verify.mjs already gates `npm audit --audit-level=high` on every release,
# so weekly devDep version churn was net-negative — the queue grew faster
# than it drained, and group bumps (e.g. @types/chrome major jumps) cost
# real refactor time.
#
# `open-pull-requests-limit: 0` disables version-update PRs entirely.
# Security update PRs (CVE-driven, surfaced by GitHub's advisory database)
# still fire automatically — they have their own internal limit of 10
# and are not affected by this setting.
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file#open-pull-requests-limit

version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 0

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 0
