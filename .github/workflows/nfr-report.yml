name: Quality Report

# Purpose: Consolidated quality checks (informational only).
# Includes: lint, tests, coverage, security audit, bundle/performance checks.
# Result: Rich workflow summary + downloadable artifacts + PR coverage delta comment.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, develop]
    paths-ignore:
      - 'docs/quality-report/**'
      - 'docs/reports/nfr/latest/**'
  schedule:
    - cron: '0 9 1 * *' # Monthly: day 1 at 09:00 UTC
  workflow_dispatch:
    inputs:
      baseline_ref:
        description: 'Coverage baseline branch/ref (used for PR/manual runs)'
        required: false
        default: 'main'
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  nfr:
    name: Quality Signals (Non-Blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prepare report directory
        run: mkdir -p nfr-reports

      - name: Compute public report URL
        run: |
          OWNER="${GITHUB_REPOSITORY%/*}"
          REPO="${GITHUB_REPOSITORY#*/}"
          echo "PUBLIC_REPORT_URL=https://${OWNER}.github.io/${REPO}/quality-report/" >> "$GITHUB_ENV"

      - name: Lint report
        id: lint
        continue-on-error: true
        run: |
          set +e
          npm run lint -- --format json --output-file nfr-reports/lint-report.json > nfr-reports/lint.log 2>&1
          LINT_EXIT=$?
          node -e "

          const toStatus = (raw) => {
            const v = String(raw || 'unknown').toLowerCase();
            if (v === 'ok') return 'pass';
            if (v === 'warn') return 'warn';
            return 'unknown';
          };

          const toCoverageLabel = (pct) => {
            if (pct === 'n/a') return 'n/a';
            return `${pct}%`;
          };
          const fs=require('fs');
          const p='nfr-reports/lint-report.json';
          let errors=0,warnings=0;
          if (fs.existsSync(p)) {
            const data=JSON.parse(fs.readFileSync(p,'utf8'));
            errors=data.reduce((s,f)=>s+(f.errorCount||0),0);
            warnings=data.reduce((s,f)=>s+(f.warningCount||0),0);
          }
            coverageSource: process.env.COVERAGE_SOURCE || 'none',
          fs.appendFileSync(process.env.GITHUB_ENV, `LINT_ERRORS=${errors}\nLINT_WARNINGS=${warnings}\n`);
          "
          if [ "$LINT_EXIT" -eq 0 ]; then
            echo "LINT_STATUS=ok" >> "$GITHUB_ENV"
          else
            echo "LINT_STATUS=warn" >> "$GITHUB_ENV"
            lintStatus: toStatus(process.env.LINT_STATUS),
            testStatus: toStatus(process.env.TEST_STATUS),
            coverageStatus: toStatus(process.env.COVERAGE_STATUS),
            securityStatus: toStatus(process.env.SECURITY_STATUS),
            perfStatus: toStatus(process.env.PERF_STATUS),
          fi
          exit 0

      - name: Unit tests
        id: tests

          const actions = [];
          if (data.lintErrors > 0) actions.push(`Fix ${data.lintErrors} lint errors before next release.`);
          if (data.auditCritical > 0 || data.auditHigh > 0) actions.push(`Prioritize security updates (${data.auditCritical} critical, ${data.auditHigh} high).`);
          if (data.coverageLinesPct !== 'n/a' && Number(data.coverageLinesPct) < 75) actions.push(`Increase line coverage (current ${data.coverageLinesPct}%).`);
          if (data.coverageLinesPct === 'n/a') actions.push('Coverage data unavailable: check coverage step output and artifacts.');
          if (data.totalJsKb > 900) actions.push(`Reduce bundle size (current total ${data.totalJsKb} KB).`);
          if (actions.length === 0) actions.push('No urgent action detected. Maintain current quality trend.');

          const chip = (label, status) => {
            const className = status === 'pass' ? 'chip pass' : status === 'warn' ? 'chip warn' : 'chip unknown';
            return `<span class="${className}">${esc(label)}: ${esc(status)}</span>`;
          };
        continue-on-error: true
        run: |
          set +e
          npm test > nfr-reports/test.log 2>&1
          TEST_EXIT=$?
          if [ "$TEST_EXIT" -eq 0 ]; then
            echo "TEST_STATUS=ok" >> "$GITHUB_ENV"
          else
            echo "TEST_STATUS=warn" >> "$GITHUB_ENV"
          fi
          exit 0
            '    :root { --bg: #f6f8fb; --card: #ffffff; --ink: #0f172a; --muted: #475569; --line: #dbe3ee; --accent: #0f766e; --warn: #b45309; --pass: #166534; --unknown: #334155; }',
            '    body { font-family: "Segoe UI", Arial, sans-serif; margin: 0; background: linear-gradient(180deg, #eff4ff 0%, #f6f8fb 45%); color: var(--ink); }',
            '    .wrap { max-width: 980px; margin: 0 auto; padding: 28px 16px 36px; }',
            '    .hero { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 18px; box-shadow: 0 6px 20px rgba(15, 23, 42, 0.06); }',
            '    h1 { margin: 0; font-size: 30px; }',
            '    h2 { margin: 0 0 10px; font-size: 20px; }',
            '    .meta { color: var(--muted); margin-top: 8px; font-size: 14px; }',
            '    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }',
            '    .chip { border-radius: 999px; padding: 4px 10px; font-size: 12px; border: 1px solid transparent; }',
            '    .chip.pass { color: var(--pass); border-color: #86efac; background: #f0fdf4; }',
            '    .chip.warn { color: var(--warn); border-color: #fcd34d; background: #fffbeb; }',
            '    .chip.unknown { color: var(--unknown); border-color: #cbd5e1; background: #f8fafc; }',
            '    .grid { margin-top: 18px; display: grid; gap: 14px; grid-template-columns: 1fr; }',
            '    .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 14px; }',
            '    table { border-collapse: collapse; width: 100%; margin-top: 8px; }',
            '    th, td { border: 1px solid var(--line); padding: 8px 10px; text-align: left; }',
            '    th { background: #f8fafc; }',
            '    ul { margin: 8px 0 0 18px; }',
            '    a { color: var(--accent); text-decoration: none; }',
            '    a:hover { text-decoration: underline; }',
            '    .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 10px; margin-top: 14px; }',
            '    .kpi { background: #f8fafc; border: 1px solid var(--line); border-radius: 10px; padding: 10px; }',
            '    .kpi .label { color: var(--muted); font-size: 12px; }',
            '    .kpi .value { font-size: 22px; font-weight: 700; margin-top: 4px; }',
            '    @media (max-width: 680px) { .wrap { padding: 16px 12px 24px; } h1 { font-size: 24px; } }',
          npm run coverage > nfr-reports/coverage.log 2>&1
          COVERAGE_EXIT=$?
          node -e "
            '  <div class="wrap">',
            '    <section class="hero">',
            '      <h1>Latest Quality Report</h1>',
            `      <p class="meta">Generated: ${esc(data.generatedAt)} | Run #${esc(data.runNumber)} | Ref: ${esc(data.ref)} | Coverage source: ${esc(data.coverageSource)}</p>`,
            `      <p class="meta"><a href="https://github.com/${esc(data.repository)}/actions/runs/${esc(data.runId)}" target="_blank" rel="noopener">Open workflow run details</a></p>`,
            `      <div class="chips">${chip('Lint', data.lintStatus)}${chip('Tests', data.testStatus)}${chip('Coverage', data.coverageStatus)}${chip('Security', data.securityStatus)}${chip('Performance', data.perfStatus)}</div>`,
            '      <div class="kpis">',
            `        <div class="kpi"><div class="label">Coverage</div><div class="value">${esc(toCoverageLabel(data.coverageLinesPct))}</div></div>`,
            `        <div class="kpi"><div class="label">Lint Errors</div><div class="value">${esc(data.lintErrors)}</div></div>`,
            `        <div class="kpi"><div class="label">Critical/High Vulns</div><div class="value">${esc(data.auditCritical + data.auditHigh)}</div></div>`,
            `        <div class="kpi"><div class="label">Total JS Bundle</div><div class="value">${esc(data.totalJsKb)} KB</div></div>`,
            '      </div>',
            '    </section>',
            '    <section class="grid">',
            '      <article class="card">',
            '        <h2>Signals</h2>',
            '        <table>',
            '          <tr><th>Area</th><th>Status</th><th>Signal</th></tr>',
            `          <tr><td>Coverage</td><td>${esc(data.coverageStatus)}</td><td>${esc(toCoverageLabel(data.coverageLinesPct))} (delta ${esc(data.coverageDelta)}%)</td></tr>`,
            `          <tr><td>Lint</td><td>${esc(data.lintStatus)}</td><td>${esc(data.lintErrors)} errors, ${esc(data.lintWarnings)} warnings</td></tr>`,
            `          <tr><td>Security</td><td>${esc(data.securityStatus)}</td><td>${esc(data.auditTotal)} total, ${esc(data.auditCritical)} critical, ${esc(data.auditHigh)} high</td></tr>`,
            `          <tr><td>Performance</td><td>${esc(data.perfStatus)}</td><td>Total JS ${esc(data.totalJsKb)} KB</td></tr>`,
            '        </table>',
            '      </article>',
            '      <article class="card">',
            '        <h2>Top Actions</h2>',
            `        <ul>${actions.map((a) => `<li>${esc(a)}</li>`).join('')}</ul>`,
            '      </article>',
            '      <article class="card">',
            '        <h2>Bundle Sizes</h2>',
            '        <table>',
            '          <tr><th>Bundle</th><th>Size</th><th>Target</th></tr>',
            `          <tr><td>Service Worker</td><td>${esc(data.swKb)} KB</td><td>&lt; 500 KB</td></tr>`,
            `          <tr><td>Popup</td><td>${esc(data.popupKb)} KB</td><td>&lt; 300 KB</td></tr>`,
            `          <tr><td>Quick Search</td><td>${esc(data.qsKb)} KB</td><td>&lt; 200 KB</td></tr>`,
            '        </table>',
            '      </article>',
            '    </section>',
            '  </div>',
              pct=((lh*100)/lf).toFixed(2);
              source='lcov';
            }
          }
          fs.appendFileSync(process.env.GITHUB_ENV, `COVERAGE_LINES_PCT=${pct}\nCOVERAGE_SOURCE=${source}\n`);
          "
          if [ "$COVERAGE_EXIT" -eq 0 ]; then
            echo "COVERAGE_STATUS=ok" >> "$GITHUB_ENV"
          else
            echo "COVERAGE_STATUS=warn" >> "$GITHUB_ENV"
          fi
          exit 0

      - name: Security audit
        id: security
        continue-on-error: true
        run: |
          set +e
          npm audit --json > nfr-reports/audit.json 2>/dev/null
          AUDIT_EXIT=$?
          node -e "
          const fs=require('fs');
          const p='nfr-reports/audit.json';
          let c=0,h=0,m=0,l=0,total=0;
          if (fs.existsSync(p)) {
            const data=JSON.parse(fs.readFileSync(p,'utf8'));
            const v=data.metadata?.vulnerabilities || {};
            c=v.critical||0;h=v.high||0;m=v.moderate||0;l=v.low||0;total=v.total||0;
          }
          fs.appendFileSync(process.env.GITHUB_ENV, `AUDIT_CRITICAL=${c}\nAUDIT_HIGH=${h}\nAUDIT_MODERATE=${m}\nAUDIT_LOW=${l}\nAUDIT_TOTAL=${total}\n`);
          "
          if [ "$AUDIT_EXIT" -eq 0 ]; then
            echo "SECURITY_STATUS=ok" >> "$GITHUB_ENV"
          else
            echo "SECURITY_STATUS=warn" >> "$GITHUB_ENV"
          fi
          exit 0

      - name: Build for performance metrics
        id: build_perf
        continue-on-error: true
        run: |
          set +e
          npm run build:prod > nfr-reports/build-perf.log 2>&1
          BUILD_EXIT=$?
          SW_SIZE=$(ls -l dist/background/service-worker.js 2>/dev/null | awk '{print $5}')
          POPUP_SIZE=$(ls -l dist/popup/popup.js 2>/dev/null | awk '{print $5}')
          QS_SIZE=$(ls -l dist/content_scripts/quick-search.js 2>/dev/null | awk '{print $5}')
          TOTAL_SIZE=$(find dist -name "*.js" -type f -exec ls -l {} \; 2>/dev/null | awk '{sum += $5} END {print sum+0}')

          SW_SIZE=${SW_SIZE:-0}
          POPUP_SIZE=${POPUP_SIZE:-0}
          QS_SIZE=${QS_SIZE:-0}
          TOTAL_SIZE=${TOTAL_SIZE:-0}

          echo "SW_SIZE_BYTES=$SW_SIZE" >> "$GITHUB_ENV"
          echo "POPUP_SIZE_BYTES=$POPUP_SIZE" >> "$GITHUB_ENV"
          echo "QS_SIZE_BYTES=$QS_SIZE" >> "$GITHUB_ENV"
          echo "TOTAL_JS_SIZE_BYTES=$TOTAL_SIZE" >> "$GITHUB_ENV"

          if [ "$BUILD_EXIT" -eq 0 ]; then
            echo "PERF_STATUS=ok" >> "$GITHUB_ENV"
          else
            echo "PERF_STATUS=warn" >> "$GITHUB_ENV"
          fi
          exit 0

      - name: Baseline coverage for delta
        id: baseline_coverage
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
        continue-on-error: true
        run: |
          BASE_REF="${{ inputs.baseline_ref || github.base_ref || 'main' }}"
          echo "BASELINE_REF=$BASE_REF" >> "$GITHUB_ENV"

          mkdir -p ../nfr-baseline
          set +e
          git worktree add ../nfr-baseline "origin/$BASE_REF" > nfr-reports/baseline.log 2>&1
          ADD_EXIT=$?
          if [ "$ADD_EXIT" -ne 0 ]; then
            echo "BASELINE_COVERAGE=n/a" >> "$GITHUB_ENV"
            exit 0
          fi

          pushd ../nfr-baseline > /dev/null
          npm ci >> "$GITHUB_WORKSPACE/nfr-reports/baseline.log" 2>&1
          npm run coverage >> "$GITHUB_WORKSPACE/nfr-reports/baseline.log" 2>&1
          popd > /dev/null

          node -e "
          const fs=require('fs');
          const p='../nfr-baseline/coverage/coverage-summary.json';
          const lcov='../nfr-baseline/coverage/lcov.info';
          let pct='n/a';
          if (fs.existsSync(p)) {
            const summary=JSON.parse(fs.readFileSync(p,'utf8'));
            const lines=summary.total?.lines?.pct;
            if (typeof lines === 'number') pct=String(lines);
          } else if (fs.existsSync(lcov)) {
            const content=fs.readFileSync(lcov,'utf8');
            let lf=0, lh=0;
            for (const line of content.split(/\r?\n/)) {
              if (line.startsWith('LF:')) lf += Number(line.slice(3)) || 0;
              if (line.startsWith('LH:')) lh += Number(line.slice(3)) || 0;
            }
            if (lf > 0) pct=((lh*100)/lf).toFixed(2);
          }
          fs.appendFileSync(process.env.GITHUB_ENV, `BASELINE_COVERAGE=${pct}\n`);
          "

          git worktree remove ../nfr-baseline --force >> nfr-reports/baseline.log 2>&1
          exit 0

      - name: Coverage delta
        id: coverage_delta
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
        run: |
          node -e "
          const fs=require('fs');
          const curr=process.env.COVERAGE_LINES_PCT || 'n/a';
          const base=process.env.BASELINE_COVERAGE || 'n/a';
          let delta='n/a';
          if (curr !== 'n/a' && base !== 'n/a') {
            delta=(Number(curr)-Number(base)).toFixed(2);
          }
          fs.appendFileSync(process.env.GITHUB_ENV, `COVERAGE_DELTA=${delta}\n`);
          "

      - name: Build consumable report bundle
        if: always()
        run: |
          node <<'NODE'
          const fs = require('fs');

          const status = {
            lint: process.env.LINT_STATUS || 'n/a',
            tests: process.env.TEST_STATUS || 'n/a',
            coverage: process.env.COVERAGE_STATUS || 'n/a',
            security: process.env.SECURITY_STATUS || 'n/a',
            performance: process.env.PERF_STATUS || 'n/a'
          };

          const metrics = {
            lintErrors: Number(process.env.LINT_ERRORS || 0),
            lintWarnings: Number(process.env.LINT_WARNINGS || 0),
            coverageLinesPct: process.env.COVERAGE_LINES_PCT || 'n/a',
            coverageBaseline: process.env.BASELINE_COVERAGE || 'n/a',
            coverageDelta: process.env.COVERAGE_DELTA || 'n/a',
            audit: {
              total: Number(process.env.AUDIT_TOTAL || 0),
              critical: Number(process.env.AUDIT_CRITICAL || 0),
              high: Number(process.env.AUDIT_HIGH || 0),
              moderate: Number(process.env.AUDIT_MODERATE || 0),
              low: Number(process.env.AUDIT_LOW || 0)
            },
            bundleKb: {
              serviceWorker: Math.floor(Number(process.env.SW_SIZE_BYTES || 0) / 1024),
              popup: Math.floor(Number(process.env.POPUP_SIZE_BYTES || 0) / 1024),
              quickSearch: Math.floor(Number(process.env.QS_SIZE_BYTES || 0) / 1024),
              totalJs: Math.floor(Number(process.env.TOTAL_JS_SIZE_BYTES || 0) / 1024)
            }
          };

          const summary = {
            generatedAt: new Date().toISOString(),
            workflow: process.env.GITHUB_WORKFLOW,
            runId: process.env.GITHUB_RUN_ID,
            runNumber: process.env.GITHUB_RUN_NUMBER,
            repository: process.env.GITHUB_REPOSITORY,
            ref: process.env.GITHUB_REF_NAME,
            status,
            metrics,
            links: {
              coverageHtml: 'coverage/index.html',
              coverageLcov: 'coverage/lcov.info',
              lintJson: 'nfr-reports/lint-report.json',
              logs: {
                lint: 'nfr-reports/lint.log',
                test: 'nfr-reports/test.log',
                coverage: 'nfr-reports/coverage.log',
                buildPerf: 'nfr-reports/build-perf.log',
                baseline: 'nfr-reports/baseline.log'
              }
            }
          };

          fs.writeFileSync('nfr-reports/summary.json', JSON.stringify(summary, null, 2));

          const md = [
            '# Quality Report Bundle',
            '',
            `Generated: ${summary.generatedAt}`,
            `Workflow: ${summary.workflow} (#${summary.runNumber})`,
            `Repository: ${summary.repository}`,
            `Ref: ${summary.ref}`,
            '',
            '## Scorecard',
            '',
            '| Area | Status | Signal |',
            '|------|--------|--------|',
            `| Lint | ${status.lint} | ${metrics.lintErrors} errors, ${metrics.lintWarnings} warnings |`,
            `| Tests | ${status.tests} | See nfr-reports/test.log |`,
            `| Coverage | ${status.coverage} | ${metrics.coverageLinesPct}% lines (delta ${metrics.coverageDelta}%) |`,
            `| Security | ${status.security} | ${metrics.audit.total} total, ${metrics.audit.critical} critical, ${metrics.audit.high} high |`,
            `| Performance | ${status.performance} | Total JS ${metrics.bundleKb.totalJs} KB |`,
            '',
            '## Bundle Sizes',
            '',
            '| Bundle | Size | Target |',
            '|--------|------|--------|',
            `| Service Worker | ${metrics.bundleKb.serviceWorker} KB | < 500 KB |`,
            `| Popup | ${metrics.bundleKb.popup} KB | < 300 KB |`,
            `| Quick Search | ${metrics.bundleKb.quickSearch} KB | < 200 KB |`,
            '',
            '## Direct Files',
            '',
            '- Human summary JSON: `nfr-reports/summary.json`',
            '- Coverage HTML: `coverage/index.html`',
            '- Coverage LCOV: `coverage/lcov.info`',
            '- Lint details JSON: `nfr-reports/lint-report.json`',
            '',
            '## Logs',
            '',
            '- `nfr-reports/lint.log`',
            '- `nfr-reports/test.log`',
            '- `nfr-reports/coverage.log`',
            '- `nfr-reports/build-perf.log`',
            '- `nfr-reports/baseline.log`'
          ].join('\n');

          fs.writeFileSync('nfr-reports/README.md', md);

          const esc = (v) => String(v).replace(/[&<>"]/g, (ch) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[ch]));
          const html = [
            '<!doctype html>',
            '<html lang="en">',
            '<head>',
            '  <meta charset="utf-8" />',
            '  <meta name="viewport" content="width=device-width, initial-scale=1" />',
            '  <title>Quality Report Bundle</title>',
            '  <style>',
            '    body { font-family: Segoe UI, Arial, sans-serif; margin: 24px; color: #1f2937; }',
            '    h1, h2 { margin: 0 0 10px; }',
            '    .meta { margin-bottom: 16px; color: #4b5563; }',
            '    table { border-collapse: collapse; width: 100%; margin: 10px 0 20px; }',
            '    th, td { border: 1px solid #d1d5db; padding: 8px 10px; text-align: left; }',
            '    th { background: #f3f4f6; }',
            '    code { background: #f3f4f6; padding: 2px 4px; border-radius: 4px; }',
            '  </style>',
            '</head>',
            '<body>',
            `  <h1>Quality Report Bundle</h1>`,
            `  <div class="meta">Generated: ${esc(summary.generatedAt)} | Run: #${esc(summary.runNumber)} | Ref: ${esc(summary.ref)}</div>`,
            '',
            '  <h2>Scorecard</h2>',
            '  <table>',
            '    <thead><tr><th>Area</th><th>Status</th><th>Signal</th></tr></thead>',
            '    <tbody>',
            `      <tr><td>Lint</td><td>${esc(status.lint)}</td><td>${esc(metrics.lintErrors)} errors, ${esc(metrics.lintWarnings)} warnings</td></tr>`,
            `      <tr><td>Tests</td><td>${esc(status.tests)}</td><td>See <code>nfr-reports/test.log</code></td></tr>`,
            `      <tr><td>Coverage</td><td>${esc(status.coverage)}</td><td>${esc(metrics.coverageLinesPct)}% lines (delta ${esc(metrics.coverageDelta)}%)</td></tr>`,
            `      <tr><td>Security</td><td>${esc(status.security)}</td><td>${esc(metrics.audit.total)} total, ${esc(metrics.audit.critical)} critical, ${esc(metrics.audit.high)} high</td></tr>`,
            `      <tr><td>Performance</td><td>${esc(status.performance)}</td><td>Total JS ${esc(metrics.bundleKb.totalJs)} KB</td></tr>`,
            '    </tbody>',
            '  </table>',
            '',
            '  <h2>Bundle Sizes</h2>',
            '  <table>',
            '    <thead><tr><th>Bundle</th><th>Size</th><th>Target</th></tr></thead>',
            '    <tbody>',
            `      <tr><td>Service Worker</td><td>${esc(metrics.bundleKb.serviceWorker)} KB</td><td>&lt; 500 KB</td></tr>`,
            `      <tr><td>Popup</td><td>${esc(metrics.bundleKb.popup)} KB</td><td>&lt; 300 KB</td></tr>`,
            `      <tr><td>Quick Search</td><td>${esc(metrics.bundleKb.quickSearch)} KB</td><td>&lt; 200 KB</td></tr>`,
            '    </tbody>',
            '  </table>',
            '',
            '  <h2>Direct Files</h2>',
            '  <ul>',
            '    <li><code>nfr-reports/summary.json</code></li>',
            '    <li><code>nfr-reports/README.md</code></li>',
            '    <li><code>coverage/index.html</code></li>',
            '    <li><code>coverage/lcov.info</code></li>',
            '  </ul>',
            '</body>',
            '</html>'
          ].join('\n');

          fs.writeFileSync('nfr-reports/index.html', html);
          NODE

      - name: Build public web report
        if: always()
        run: |
          mkdir -p docs/quality-report
          mkdir -p docs/reports/nfr/latest
          node <<'NODE'
          const fs = require('fs');
          const esc = (v) => String(v).replace(/[&<>"]/g, (ch) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[ch]));

          const data = {
            generatedAt: new Date().toISOString(),
            repository: process.env.GITHUB_REPOSITORY,
            ref: process.env.GITHUB_REF_NAME,
            runId: process.env.GITHUB_RUN_ID,
            runNumber: process.env.GITHUB_RUN_NUMBER,
            coverageLinesPct: process.env.COVERAGE_LINES_PCT || 'n/a',
            coverageDelta: process.env.COVERAGE_DELTA || 'n/a',
            lintErrors: Number(process.env.LINT_ERRORS || 0),
            lintWarnings: Number(process.env.LINT_WARNINGS || 0),
            auditTotal: Number(process.env.AUDIT_TOTAL || 0),
            auditCritical: Number(process.env.AUDIT_CRITICAL || 0),
            auditHigh: Number(process.env.AUDIT_HIGH || 0),
            swKb: Math.floor(Number(process.env.SW_SIZE_BYTES || 0) / 1024),
            popupKb: Math.floor(Number(process.env.POPUP_SIZE_BYTES || 0) / 1024),
            qsKb: Math.floor(Number(process.env.QS_SIZE_BYTES || 0) / 1024),
            totalJsKb: Math.floor(Number(process.env.TOTAL_JS_SIZE_BYTES || 0) / 1024)
          };

          fs.writeFileSync('docs/quality-report/summary.json', JSON.stringify(data, null, 2));

          const html = [
            '<!doctype html>',
            '<html lang="en">',
            '<head>',
            '  <meta charset="utf-8" />',
            '  <meta name="viewport" content="width=device-width, initial-scale=1" />',
            '  <title>Latest Quality Report</title>',
            '  <style>',
            '    body { font-family: Segoe UI, Arial, sans-serif; margin: 24px auto; max-width: 960px; padding: 0 16px; color: #1f2937; }',
            '    h1, h2 { margin: 0 0 10px; }',
            '    .meta { color: #4b5563; margin-bottom: 12px; }',
            '    table { border-collapse: collapse; width: 100%; margin: 12px 0 20px; }',
            '    th, td { border: 1px solid #d1d5db; padding: 8px 10px; text-align: left; }',
            '    th { background: #f3f4f6; }',
            '  </style>',
            '</head>',
            '<body>',
            '  <h1>Latest Quality Report</h1>',
            `  <p class="meta">Generated: ${esc(data.generatedAt)} | Run #${esc(data.runNumber)} | Ref: ${esc(data.ref)}</p>`,
            `  <p><a href="https://github.com/${esc(data.repository)}/actions/runs/${esc(data.runId)}" target="_blank" rel="noopener">Open workflow run</a></p>`,
            '',
            '  <h2>Scorecard</h2>',
            '  <table>',
            '    <tr><th>Area</th><th>Signal</th></tr>',
            `    <tr><td>Coverage</td><td>${esc(data.coverageLinesPct)}% (delta ${esc(data.coverageDelta)}%)</td></tr>`,
            `    <tr><td>Lint</td><td>${esc(data.lintErrors)} errors, ${esc(data.lintWarnings)} warnings</td></tr>`,
            `    <tr><td>Security</td><td>${esc(data.auditTotal)} total, ${esc(data.auditCritical)} critical, ${esc(data.auditHigh)} high</td></tr>`,
            `    <tr><td>Performance</td><td>Total JS ${esc(data.totalJsKb)} KB</td></tr>`,
            '  </table>',
            '',
            '  <h2>Bundle Sizes</h2>',
            '  <table>',
            '    <tr><th>Bundle</th><th>Size</th><th>Target</th></tr>',
            `    <tr><td>Service Worker</td><td>${esc(data.swKb)} KB</td><td>&lt; 500 KB</td></tr>`,
            `    <tr><td>Popup</td><td>${esc(data.popupKb)} KB</td><td>&lt; 300 KB</td></tr>`,
            `    <tr><td>Quick Search</td><td>${esc(data.qsKb)} KB</td><td>&lt; 200 KB</td></tr>`,
            '  </table>',
            '</body>',
            '</html>'
          ].join('\n');

          fs.writeFileSync('docs/quality-report/index.html', html);

          const redirect = [
            '<!doctype html>',
            '<html lang="en">',
            '<head>',
            '  <meta charset="utf-8" />',
            '  <meta http-equiv="refresh" content="0; url=/smruti-cortex/quality-report/" />',
            '  <title>Moved: Quality Report</title>',
            '</head>',
            '<body>',
            '  <p>Moved to <a href="/smruti-cortex/quality-report/">/quality-report/</a></p>',
            '</body>',
            '</html>'
          ].join('\n');
          fs.writeFileSync('docs/reports/nfr/latest/index.html', redirect);
          NODE

      - name: Publish public report to docs
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/quality-report docs/reports/nfr/latest
          git diff --cached --quiet && exit 0
          git commit -m "docs: update latest quality report [skip ci]"
          git push

      - name: Upload NFR artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-report-bundle-${{ github.run_number }}
          path: |
            coverage
            nfr-reports
          retention-days: 30

      - name: Quality summary report
        if: always()
        run: |
          SW_KB=$((SW_SIZE_BYTES / 1024))
          POPUP_KB=$((POPUP_SIZE_BYTES / 1024))
          QS_KB=$((QS_SIZE_BYTES / 1024))
          TOTAL_KB=$((TOTAL_JS_SIZE_BYTES / 1024))
          if [ "$COVERAGE_LINES_PCT" = "n/a" ]; then
            COV_DISPLAY="n/a"
          else
            COV_DISPLAY="${COVERAGE_LINES_PCT}%"
          fi

          echo "## Quality Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> Fast health snapshot for this run. Non-blocking by design." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Executive Snapshot" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Signal | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Coverage (lines) | **${COV_DISPLAY}** (source: ${COVERAGE_SOURCE}) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Lint issues | ${LINT_ERRORS} errors, ${LINT_WARNINGS} warnings |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Security | ${AUDIT_TOTAL} total, ${AUDIT_CRITICAL} critical, ${AUDIT_HIGH} high |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Bundle size | Total JS ${TOTAL_KB} KB |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Quality Signals" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Area | Status | Key Signal |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|------------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Lint | ${LINT_STATUS} | ${LINT_ERRORS} errors, ${LINT_WARNINGS} warnings |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tests | ${TEST_STATUS} | See test.log artifact for details |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Coverage | ${COVERAGE_STATUS} | ${COV_DISPLAY} lines (source: ${COVERAGE_SOURCE}) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Security | ${SECURITY_STATUS} | ${AUDIT_TOTAL} total (${AUDIT_CRITICAL} critical, ${AUDIT_HIGH} high) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Performance | ${PERF_STATUS} | Total JS ${TOTAL_KB} KB |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Top 3 Actions" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "$LINT_ERRORS" -gt 0 ]; then
            echo "1. Fix lint errors first to improve stability and contributor trust." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "1. Lint errors are clean. Keep this as baseline." >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "$AUDIT_CRITICAL" -gt 0 ] || [ "$AUDIT_HIGH" -gt 0 ]; then
            echo "2. Prioritize dependency security remediation for high/critical advisories." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "2. Security advisories are under control. Continue regular monitoring." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "3. Review coverage trend and add tests in recently changed modules." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Bundle Sizes" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Bundle | Size | Target |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service Worker | ${SW_KB} KB | < 500 KB |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Popup | ${POPUP_KB} KB | < 300 KB |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Quick Search | ${QS_KB} KB | < 200 KB |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${BASELINE_REF}" ]; then
            echo "### Coverage Trend" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Baseline: \`${BASELINE_REF}\` = ${BASELINE_COVERAGE}%" >> "$GITHUB_STEP_SUMMARY"
            echo "Current: ${COVERAGE_LINES_PCT}%" >> "$GITHUB_STEP_SUMMARY"
            echo "Delta: ${COVERAGE_DELTA}%" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "### Quick Links" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Public latest report: ${PUBLIC_REPORT_URL}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Download artifact: \`quality-report-bundle-${{ github.run_number }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Internal bundle entry points: \`nfr-reports/README.md\`, \`nfr-reports/index.html\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- This workflow is informational and non-blocking by design." >> "$GITHUB_STEP_SUMMARY"

      - name: PR coverage comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- nfr-coverage-comment -->';
            const body = [
              marker,
              '## Quality Report Coverage Snapshot',
              '',
              `- Current coverage (lines): **${process.env.COVERAGE_LINES_PCT || 'n/a'}%**`,
              `- Baseline (${process.env.BASELINE_REF || 'main'}): **${process.env.BASELINE_COVERAGE || 'n/a'}%**`,
              `- Delta: **${process.env.COVERAGE_DELTA || 'n/a'}%**`,
              '',
              'Coverage here is informational (non-blocking).'
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }
