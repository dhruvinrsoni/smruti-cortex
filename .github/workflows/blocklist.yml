name: Blocklist Guard

# Purpose
# ─────────────────────────────────────────────────────────────────────────────
# Rejects any push / PR that reintroduces terms listed in
# scripts/blocklist-terms.txt. Runs a Node-only scan (no npm install needed).
#
# Modes
# ─────────────────────────────────────────────────────────────────────────────
#   - pull_request: scans only files changed vs. the PR base (fast, focused).
#   - push:         scans the entire tracked tree on main (safety net — catches
#                   drift from non-PR pushes and from long-running branches).
#
# Output is intentionally redacted (short SHA-1 hashes + masked snippets) so CI
# logs never leak the very terms the blocklist exists to contain. Developers
# get full details locally via the pre-commit hook and `--verbose`.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: 'Scan mode'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - changed

permissions:
  contents: read

jobs:
  scan:
    name: Scan for blocked terms
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Need full history so `git diff base...HEAD` works for PRs.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run blocklist scan (pull request)
        if: github.event_name == 'pull_request'
        env:
          CI: 'true'
        run: |
          BASE_REF="origin/${{ github.event.pull_request.base.ref }}"
          echo "Scanning files changed vs $BASE_REF..."
          node scripts/check-blocklist.mjs --changed "$BASE_REF" --ci

      - name: Run blocklist scan (push to main)
        if: github.event_name == 'push'
        env:
          CI: 'true'
        run: |
          echo "Scanning entire tracked tree..."
          node scripts/check-blocklist.mjs --all --ci

      - name: Run blocklist scan (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          CI: 'true'
        run: |
          MODE="${{ inputs.mode }}"
          if [ "$MODE" = "changed" ]; then
            node scripts/check-blocklist.mjs --changed "origin/main" --ci
          else
            node scripts/check-blocklist.mjs --all --ci
          fi

      - name: Run blocklist scanner unit tests
        run: node --test scripts/__tests__/check-blocklist.test.mjs

      - name: Summary
        if: success()
        run: |
          echo "### ✅ Blocklist guard passed" >> $GITHUB_STEP_SUMMARY
          echo "No hard- or soft-blocked terms detected in scanned files." >> $GITHUB_STEP_SUMMARY

      - name: Summary (failed)
        if: failure()
        run: |
          echo "### ❌ Blocklist guard failed" >> $GITHUB_STEP_SUMMARY
          echo "One or more files contain blocklisted terms." >> $GITHUB_STEP_SUMMARY
          echo "Run locally for full context:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```sh' >> $GITHUB_STEP_SUMMARY
          echo "node scripts/check-blocklist.mjs --changed origin/main --verbose" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
