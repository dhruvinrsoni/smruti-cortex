# Staging Build — minimal develop-branch build for pre-release testing.
#
# When to use:
#   Push to `develop` when you want to test destabilising changes before merging
#   to main. Download the artifact, extract, and Load Unpacked in Chrome.
#
# How to extend (e.g. add tests, lint, matrix):
#   This file was trimmed from ~180 lines to ~40 for LTS simplicity.
#   Full history is in git — `git log --follow .github/workflows/staging.yml`.
#   Add steps between "Install dependencies" and "Build" as needed.

name: Staging Build

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
  workflow_dispatch:

jobs:
  staging-build:
    name: Build Staging Extension
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Mark as staging
        run: |
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('manifest.json','utf8'));
            m.name += ' (STAGING)';
            fs.writeFileSync('manifest.json', JSON.stringify(m, null, 2));
          "

      - run: npm run build:prod

      - uses: actions/upload-artifact@v4
        with:
          name: smruti-cortex-staging
          path: dist/
          retention-days: 14
