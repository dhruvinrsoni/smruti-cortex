name: Triage Ranking Reports

# Purpose: Auto-label and silo every issue tagged `ranking-bug` so the
# maintainer's main triage URL stays uncluttered.
#
# Trigger: A new issue opens (or labels are edited) AND it carries the
# `ranking-bug` label.
#
# Behaviour:
#   1. Adds `needs-triage` so it lands in the triage queue (matches the
#      existing convention used by other Issue Forms).
#   2. Adds `sink: ranking-reports` if the extension didn't already
#      apply it — this is the silo that the maintainer's primary
#      triage filter excludes via -label:"sink: ranking-reports".
#   3. Posts a friendly orientation comment so a human-filed report
#      gets the same maintainer expectations as an auto-filed one.
#
# Idempotent: gh always-add label calls are no-ops when the label is
# already present, and we gate the comment on a marker string so
# re-running the workflow won't double-post.

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write
  contents: read

jobs:
  triage:
    name: Apply triage labels and orient
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'ranking-bug')
    timeout-minutes: 5

    steps:
      - name: Add needs-triage and sink labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          # gh accepts repeated --add-label flags; if a label is already
          # on the issue this is a no-op.
          gh issue edit "$ISSUE" \
            --repo "$REPO" \
            --add-label "needs-triage" \
            --add-label "sink: ranking-reports"

      - name: Post orientation comment (once)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          MARKER="<!-- smruti-cortex:triage-ranking-reports:v1 -->"

          # Check if we already posted (idempotency guard).
          EXISTING=$(gh issue view "$ISSUE" --repo "$REPO" --json comments \
            --jq ".comments[].body" | grep -F "$MARKER" || true)

          if [ -n "$EXISTING" ]; then
            echo "Orientation comment already present — skipping."
            exit 0
          fi

          # NOTE: A heredoc (cat <<EOF ... EOF) would be the obvious choice
          # here, but bash requires the closing EOF marker to sit at column 1
          # with no leading whitespace — which directly conflicts with YAML's
          # literal-block-scalar indent rule (every non-empty line must be
          # indented to the block baseline). printf with one arg per line is
          # the only pattern that satisfies both: args are YAML-indented for
          # the parser, but the produced strings carry no leading whitespace.
          BODY=$(printf '%s\n' \
            "$MARKER" \
            "" \
            "Thanks for the ranking report! 🙏 A few notes on what happens next:" \
            "" \
            "- This issue was siloed into the \`sink: ranking-reports\` bucket so it" \
            "  doesn't drown out other tickets in the maintainer's main triage queue." \
            "  You can still find it via the [ranking reports filter](https://github.com/${REPO}/issues?q=is%3Aissue+label%3Aranking-bug)." \
            "- A maintainer will look at the auto-generated debug data, look for" \
            "  duplicates, and either prioritise it (\`priority: low/medium/high\`)" \
            "  or close as \`wontfix\` / \`duplicate\`." \
            "- If the report includes a \"🧊 Degenerate ranking detected\" callout" \
            "  the answer is usually \"add more query tokens\" — short queries hit" \
            "  hundreds of items that all tie on every relevance tier, so the final" \
            "  order falls back to your sort preference." \
            "" \
            "If you have repro steps beyond what the form captured, please add them" \
            "as a follow-up comment.")
          gh issue comment "$ISSUE" --repo "$REPO" --body "$BODY"
