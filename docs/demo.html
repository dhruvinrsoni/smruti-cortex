<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmrutiCortex - Interactive Demo</title>
    <meta name="description" content="Try SmrutiCortex search right in your browser. AI keyword expansion, semantic search, Vivek Search scoring — all interactive, no install needed.">
    <link rel="icon" type="image/png" href="assets/icon-48.png">
    <link rel="stylesheet" href="demo.css">
</head>
<body class="demo-page">

    <!-- Header (hidden in iframe/embed mode) -->
    <header class="demo-header">
        <div class="demo-container">
            <div class="demo-header-inner">
                <a href="index.html" class="demo-logo">
                    <img src="assets/icon-48.png" alt="SmrutiCortex">
                    <span>SmrutiCortex</span>
                    <span class="demo-logo-label">Interactive Demo</span>
                </a>
                <div class="demo-header-actions">
                    <button class="demo-btn demo-btn-ghost" id="demoThemeToggle" aria-label="Toggle dark mode"></button>
                    <a href="https://chromewebstore.google.com/detail/ecnkiihcifbfnhjblicfbppplobiicoi" class="demo-btn demo-btn-primary" target="_blank">Install Extension</a>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Demo Area -->
    <main class="demo-main">
        <div class="demo-container">

            <!-- Settings Bar -->
            <div class="demo-settings">
                <label class="demo-toggle">
                    <input type="checkbox" id="demoAIToggle" checked>
                    <span>AI Expansion</span>
                </label>
                <label class="demo-toggle">
                    <input type="checkbox" id="demoSemanticToggle">
                    <span>Semantic</span>
                </label>
                <div class="demo-view-btns">
                    <button class="demo-view-btn active" id="demoViewList">List</button>
                    <button class="demo-view-btn" id="demoViewCards">Cards</button>
                </div>
            </div>

            <!-- Search Input -->
            <div class="demo-search-wrap">
                <span class="demo-search-icon">&#128269;</span>
                <input type="text" class="demo-search" id="demoSearch" placeholder="Type to search your history..." autocomplete="off" autofocus>
            </div>

            <!-- AI Status Bar -->
            <div class="demo-ai-bar" id="demoAIBar"></div>

            <!-- Result Count -->
            <div class="demo-count" id="demoCount"></div>

            <!-- Results -->
            <div class="demo-results" id="demoResults"></div>

            <!-- Footer -->
            <div class="demo-footer">
                <div class="demo-footer-inner">
                    <span><kbd>Enter</kbd> open</span>
                    <span><kbd>&#8593;&#8595;</kbd> navigate</span>
                    <span><kbd>Esc</kbd> clear</span>
                    <div class="demo-footer-right">
                        <a href="index.html">Back to site</a>
                        <a href="https://github.com/dhruvinrsoni/smruti-cortex" target="_blank">GitHub</a>
                    </div>
                </div>
            </div>

            <!-- Overlay Demo Section -->
            <div class="demo-overlay-section">
                <div class="demo-overlay-title">Quick-Search Overlay</div>
                <div class="demo-overlay-wrap">
                    <div class="demo-fake-page">
                        <div class="demo-fake-bar"></div>
                        <div class="demo-fake-line" style="width:80%"></div>
                        <div class="demo-fake-line" style="width:60%"></div>
                        <div class="demo-fake-line" style="width:90%"></div>
                        <div class="demo-fake-line" style="width:70%"></div>
                        <div class="demo-fake-line" style="width:50%"></div>
                        <div class="demo-fake-line" style="width:85%"></div>
                    </div>
                    <div class="demo-overlay-popup">
                        <div class="demo-overlay-header">
                            <img src="assets/icon-48.png" alt="" class="demo-overlay-logo">
                            <input type="text" class="demo-overlay-input" id="demoOverlayInput" placeholder="Search..." autocomplete="off">
                        </div>
                        <div class="demo-overlay-results" id="demoOverlayResults"></div>
                        <div class="demo-overlay-footer">
                            <span><kbd>&#8593;&#8595;</kbd> navigate</span>
                            <span><kbd>Esc</kbd> close</span>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="demo.js"></script>
</body>
</html>
